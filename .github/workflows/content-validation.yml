name: Content validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-content:
    name: Validate content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate content
        run: npm run validate:content

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
